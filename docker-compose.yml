services:
  checkmk:
    extends:
      file: ../compose-security-baseline/hardening.yml
      service: limits-xxlarge
    image: checkmk/check-mk-cloud:2.4.0p17
    # Checkmk runs a full monitoring site; keep privilege transitions unchanged until a site-level smoke test passes.
    cpu_shares: 256
    restart: unless-stopped
    extra_hosts:
      - "${DOCKER_DOMAIN}:host-gateway"
    ports:
      - "8000:8000"
    
    volumes:
      - monitoring:/omd/sites
      - /etc/localtime:/etc/localtime:ro
      - /opt/omd/sites/cmk/tmp:/opt/omd/sites/cmk/tmp:tmpfs,size=256m
      - ./scripts/mk_docker.py:/opt/omd/versions/default/share/check_mk/agents/plugins/mk_docker.py
      - ./scripts/check_mk_telegram-notify.sh:/opt/omd/versions/default/share/check_mk/notifications/telegram.sh
      # Keep the automation helper at one worker instead of the packaged default of two.
      - ./config/automation-helper/_config.py:/omd/versions/default/lib/python3/cmk/base/automation_helper/_config.py
      - ./config/checkmk-site/etc/omd/site.conf:/omd/sites/cmk/etc/omd/site.conf
      - ./config/checkmk-site/etc/check_mk/conf.d/wato/global.mk:/omd/sites/cmk/etc/check_mk/conf.d/wato/global.mk
      - ./config/checkmk-site/etc/check_mk/conf.d/wato/rules.mk:/omd/sites/cmk/etc/check_mk/conf.d/wato/rules.mk
      - ./config/checkmk-site/etc/check_mk/conf.d/wato/docker_home_arpa_containers/rules.mk:/omd/sites/cmk/etc/check_mk/conf.d/wato/docker_home_arpa_containers/rules.mk
      - ./config/apache.conf:/omd/sites/cmk/etc/apache/apache.conf

    labels:
      - "checkmk_monitor=true"
      - "traefik.enable=true"
      - "traefik.http.routers.checkmk.rule=Host(`checkmk.${DOCKER_DOMAIN}`)"
      - "traefik.http.routers.checkmk.entrypoints=https"
      - "traefik.http.routers.checkmk.tls=true"
      - "traefik.http.routers.checkmk.service=checkmk"
      - "traefik.http.services.checkmk.loadbalancer.server.port=5000"

    networks:
      - traefik_proxy

volumes:
  monitoring:

networks:
  traefik_proxy:
    external: true
