# The site Apache runs behind Traefik over backend HTTP. Intercept the entry
# point redirects before Checkmk's generated conf emits absolute http:// URLs.
RewriteEngine On
RewriteRule ^/$ https://checkmk.docker.home.arpa/cmk/ [R=302,L]
RewriteRule ^/cmk(/?|/check_mk)$ https://checkmk.docker.home.arpa/cmk/check_mk/ [R=302,L]
